<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intro a Flexbox</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Intro a Flexbox 🚀</h1>

  <div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
  </div>

  <h1>Ejercicio práctico flexbox</h1>

  <header>
    <div class="logo">FlashCard</div>
    <div class="botones">
      <button>Study mode</button>
      <button>All cards</button>
    </div>
  </header>

  <main>
    <div class="main-content">
      <div class="primera-parte">
        <div class="content1">
          <div>
            <select name="all-categories" id="all-categories">

              <option value="all1">All Categories</option>
              <option value="all2">...</option>
              <option value="all3">...</option>
              <option value="all4">...</option>
            </select>
          </div>
          <div class="checkbox-container">
            <input type="checkbox" name="" id="terms">
            <label for="terms">Hide Mastered</label>

          </div>

        </div>
        <div class="content2">
          <button class="Shuffle">Shuffle</button>
        </div>
      </div>
      <div class="segunda-parte"> 
        <div class="pizarra">
          <div class="card1"> 
            <button class="web">web Development</button>
          </div>
          <div class="card2">
            <h1 class="question">What does HTML stand for?</h1>
            <p class="hint">click to reveal answer</p>
          </div>
          <div class="card3"></div>
        </div>
        <div class="controles">
          <button class="i-know">I Know This</button>
          <button class="reset">Reset Progress</button>
        </div>
      </div>
      <div class="tercera-parte"></div>
    </div>
    <div class="statistics"></div>
  </main>

</body>

</html>
