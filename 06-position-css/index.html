<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Position CSS</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Header -->
    <header>
      <nav class="navbar">
        <a href="#home">Inicio</a>

        <a href="#services">Servicios</a>

        <a href="#about">Nosotros</a>

        <a href="#contact">Contacto</a>
      </nav>
    </header>

    <!-- Escena de juego -->
    <div class="game-container">
      <img
        class="bg-game"
        src="https://c4.wallpaperflare.com/wallpaper/198/583/580/angry-birds-video-games-wallpaper-preview.jpg"
        alt=""
      />
    
      <img class="equis" src="./assets/equis.png" alt="" width="50px">
      <img class="game-title" src="./assets/Angry_Birds_logos.png" alt="Angry Birds Logo" width="300">
      
      <div class="bird bird-1">
        <img src="./assets/bird-1.png" alt=""width="50px">
      </div>
      <div class="bird bird-2">
        <img src="./assets/bird-2.png" alt=""width="50px">
      </div>
      <img class="btn-play" src="./assets/play.png" alt=""width="300px">
      <div class="btn-config-game">
        <img class="btn-settings" src="./assets/ajustes.png" alt=""width="50px">
        <img class="btn-world" src="./assets/nube.png" alt=""width="50px">
        <img class="btn-menu" src="./assets/dezplegar.png" alt=""width="50px">
      </div>
    </div>

    <!-- Footer -->

    <footer class="cookie-footer">
      <p>
        Este sitio utiliza cookies para mejorar la experiencia.
        <a href="#cookies-policy">Más información</a>.
      </p>

      <button class="cookie-accept">Aceptar</button>
    </footer>




  </body>
</html>
